version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - DYNAMODB_ENDPOINT=http://localstack:4566
    depends_on:
      - localstack

  localstack:
    container_name: sovereign_localstack
    image: localstack/localstack:latest
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=s3,lambda,apigateway,dynamodb,kms,route53,ec2,iam
      - AWS_DEFAULT_REGION=ap-south-1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"